<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unscramble Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> <div class="container">
  <h1>Unscramble Word</h1>

<h2 class="scrambledWord">Press Start</h2>

<button onclick="startGame()">Start Game</button>

<br><br>

<input type="text" id="input" placeholder="Enter word">

<br><br>
<div class="buttons">
<button onclick="checkAnswer()">Check</button>
<button onclick="nextRound()">Next Word</button>
</div>
<p class="result"></p>
 <h3>Score: <span class="score">0</span></h3>
</div>
<script src="script.js"></script>  
</body>
</html>
